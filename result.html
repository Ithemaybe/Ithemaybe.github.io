<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Результат — Флаги Мира</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<img id="swimming-cat" src="" alt="">
<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="wrapper">
  <div class="screen active" style="text-align:center;" id="result-block">

    <!-- Shown while loading -->
    <div id="loading-state">
      <div class="hero-icon" style="font-size:3rem">⏳</div>
      <p class="hero-sub">Загрузка результата…</p>
    </div>

    <!-- Shown when result found -->
    <div id="found-state" style="display:none; flex-direction:column; align-items:center; gap:1.5rem;">
      <div class="result-trophy anim-in" id="result-trophy">🏆</div>
      <h2 class="result-title anim-in" style="animation-delay:.1s">Результат игры</h2>
      <p class="hero-sub anim-in" id="result-date" style="animation-delay:.15s;opacity:.5;font-size:.85rem;"></p>

      <div class="result-stats anim-in" style="animation-delay:.2s">
        <div class="rs-box rs-correct">
          <div class="rs-num" id="res-correct">0</div>
          <div class="rs-label">Угадано</div>
        </div>
        <div class="rs-divider">|</div>
        <div class="rs-box rs-wrong">
          <div class="rs-num" id="res-wrong">0</div>
          <div class="rs-label">Ошибок</div>
        </div>
        <div class="rs-divider">|</div>
        <div class="rs-box rs-total">
          <div class="rs-num" id="res-total">0</div>
          <div class="rs-label">Всего</div>
        </div>
      </div>

      <div class="result-pct anim-in" style="animation-delay:.3s; width:100%">
        <div class="pct-bar">
          <div class="pct-fill" id="pct-fill" style="width:0%"></div>
        </div>
        <div class="pct-text" id="pct-text">0% правильных</div>
      </div>

      <div class="share-box anim-in" style="animation-delay:.4s; width:100%">
        <span class="share-label">Ссылка на этот результат:</span>
        <div class="share-row">
          <input class="share-input" id="share-url" readonly>
          <button class="copy-btn" id="copy-btn" title="Скопировать">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
          </button>
        </div>
      </div>

      <a href="index.html" class="btn-start" style="display:inline-block;text-decoration:none;margin-top:.5rem;">
        Играть снова
      </a>
    </div>

    <!-- Shown when result NOT found -->
    <div id="notfound-state" style="display:none; flex-direction:column; align-items:center; gap:1.5rem;">
      <div class="hero-icon">🚩</div>
      <h2 class="result-title">Результат не найден</h2>
      <p class="hero-sub">Эта ссылка недействительна или устарела.</p>
      <a href="index.html" class="btn-start" style="display:inline-block;text-decoration:none">На главную</a>
    </div>

  </div>
</div>

<script>
(function () {
  const loading  = document.getElementById('loading-state');
  const found    = document.getElementById('found-state');
  const notfound = document.getElementById('notfound-state');

  function showFound(data) {
    loading.style.display = 'none';
    found.style.display   = 'flex';

    const pct = data.total > 0 ? Math.round(data.correct / data.total * 100) : 0;

    document.getElementById('result-trophy').textContent =
      pct >= 80 ? '🏆' : pct >= 50 ? '🥈' : '🌍';
    document.getElementById('res-correct').textContent = data.correct;
    document.getElementById('res-wrong').textContent   = data.wrong;
    document.getElementById('res-total').textContent   = data.total;
    document.getElementById('result-date').textContent = data.created_at || '';
    document.getElementById('pct-text').textContent    = pct + '% правильных';
    document.getElementById('share-url').value         = location.href;

    requestAnimationFrame(() => {
      document.getElementById('pct-fill').style.width = pct + '%';
    });
  }

  function showNotFound() {
    loading.style.display   = 'none';
    notfound.style.display  = 'flex';
  }

  // ── Читаем результат из URL-хэша ──
  // Формат: result.html#c=12&w=3&t=15&d=2026-04-22+20:03
  const hash = location.hash.slice(1);

  if (!hash) {
    showNotFound();
    return;
  }

  try {
    const params = Object.fromEntries(
      hash.split('&').map(p => {
        const [k, v] = p.split('=');
        return [k, decodeURIComponent(v || '')];
      })
    );

    const correct = parseInt(params.c, 10);
    const wrong   = parseInt(params.w, 10);
    const total   = parseInt(params.t, 10);

    if (isNaN(correct) || isNaN(wrong) || isNaN(total)) {
      showNotFound();
      return;
    }

    showFound({
      correct,
      wrong,
      total,
      created_at: (params.d || '').replace('+', ' '),
    });
  } catch (e) {
    showNotFound();
  }

  // Copy button
  document.getElementById('copy-btn').addEventListener('click', () => {
    const inp = document.getElementById('share-url');
    inp.select();
    navigator.clipboard.writeText(inp.value).catch(() => {
      document.execCommand('copy');
    });
    const btn = document.getElementById('copy-btn');
    btn.classList.add('copied');
    setTimeout(() => btn.classList.remove('copied'), 1500);
  });
})();
</script>
<script src="swimming-cat.js"></script>
</body>
</html>
